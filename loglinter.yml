rules:
  lowercase:
    enabled: true

  english_only:
    enabled: true

  no_special_chars:
    enabled: true

  sensitive_words:
    enabled: true
    words:
      - password
      - passwd
      - pwd
      - secret
      - token
      - api_key
      - apikey
      - credential
      - private_key
      - access_token
      - refresh_token
      - secret_key
      - encryption_key
      - secret_token

    safe_phrases:
      - validated
      - verified
      - expired
      - refreshed
      - rotated
      - changed
      - updated
      - deleted
      - created
      - generated
      - revoked
      - invalid
      - missing
      - required
      - configured
      - initialized
      - loaded
      - saved
      - cleared
      - reset
      - processed
      - synchronized

  custom_patterns:
    enabled: true
    patterns:
      - 'user_\d+'
      - '\d{3}-\d{3}-\d{4}'