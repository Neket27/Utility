rules:
  lowercase:
    enabled: false

  english_only:
    enabled: false

  no_special_chars:
    enabled: false

  sensitive_words:
    enabled: false
    words:
      - password
      - token
      - secret
      - api_key
      - my_custom_secret

  custom_patterns:
    enabled: true
    patterns:
      - 'user_\d+'
      - '\d{3}-\d{3}-\d{4}'